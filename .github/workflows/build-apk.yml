name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: |
          flutter pub get
          # إذا كان مشروعك يحتاج للمزامنة محلياً، تأكد أن مجلد 'android' 
          # موجود ومحدث داخل المستودع مسبقاً، هذا يوفر علينا تعقيدات Node.js
        
      - name: Build APK
        run: flutter build apk --release --offline

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
